<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Ready</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

/* Start Screen */
#startScreen {
  cursor: pointer;
}

#startScreen h1 {
  font-size: 2em;
}

/* Error Screen */
#errorScreen {
  display: none;
  color: #ff3b3b;
}

#temp {
  font-size: 2em;
  margin-top: 20px;
}

.blink {
  animation: blink 0.6s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* Blackout */
#blackout {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
  justify-content: center;
  align-items: center;
  font-size: 1.5em;
}
</style>
</head>

<body>

<!-- Start Screen -->
<div id="startScreen" onclick="startPrank()">
  <h1>✅ System Ready</h1>
  <p>Tap anywhere to continue</p>
</div>

<!-- Error Screen -->
<div id="errorScreen">
  <h1 class="blink">⚠️ SYSTEM WARNING</h1>
  <p>Critical thermal event detected.</p>
  <p>Status: <span id="status">STABLE</span></p>
  <div id="temp">Temperature: 35°C</div>
</div>

<!-- Final -->
<div id="blackout">
  😆 Relax… your phone is fine.<br><br>
  April Fooool 🔥
</div>

<script>
let temp = 35;
let speed = 1000;
let minSpeed = 200;
let acceleration = 30;

function startPrank() {
  // Fullscreen
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen();
  }

  // Switch screens
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("errorScreen").style.display = "block";

  setTimeout(increaseTemp, speed);
}

function increaseTemp() {
  temp += 1;

  const display = document.getElementById("temp");
  const status = document.getElementById("status");

  display.innerText = "Temperature: " + temp + "°C";

  if (temp > 80) {
    status.innerText = "WARNING";
    status.style.color = "orange";
  }

  if (temp > 120) {
    status.innerText = "CRITICAL";
    status.style.color = "red";
    display.classList.add("blink");
  }

  if (temp >= 170) {
    document.body.innerHTML = "";
    document.body.style.background = "black";

    setTimeout(() => {
      document.getElementById("blackout").style.display = "flex";
    }, 3000);
    return;
  }

  if (speed > minSpeed) speed -= acceleration;

  setTimeout(increaseTemp, speed);
}
</script>

</body>
</html>
